<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GH-Max V1.0 - 现货黄金全域多维AI智能研判系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .status {
            display: inline-block;
            padding: 5px 15px;
            background: #4ade80;
            border-radius: 20px;
            font-size: 0.9em;
            margin-top: 10px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .card-title {
            font-size: 1.2em;
            color: #ffd700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .score-display {
            text-align: center;
            padding: 30px;
        }
        
        .score-value {
            font-size: 4em;
            font-weight: bold;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .score-trend {
            font-size: 1.5em;
            margin-top: 10px;
            color: #4ade80;
        }
        
        .market-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .market-item:last-child {
            border-bottom: none;
        }
        
        .market-label {
            color: #aaa;
        }
        
        .market-value {
            font-weight: bold;
            color: #fff;
        }
        
        .positive {
            color: #4ade80;
        }
        
        .negative {
            color: #f87171;
        }
        
        .indicator {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .refresh-btn {
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            color: #1a1a2e;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 25px;
            cursor: pointer;
            display: block;
            margin: 30px auto;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .refresh-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2em;
            color: #ffd700;
        }
        
        .error {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid #f87171;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            color: #f87171;
        }
        
        .last-update {
            text-align: center;
            color: #888;
            margin-top: 20px;
            font-size: 0.9em;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .score-value {
                font-size: 3em;
            }
            
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌟 GH-Max V1.0</h1>
            <p>现货黄金全域多维AI智能研判系统</p>
            <div class="status" id="status">● 连接中...</div>
        </div>
        
        <button class="refresh-btn" onclick="refreshData()">🔄 手动刷新数据</button>
        
        <div id="loading" class="loading" style="display: none;">
            正在加载数据...
        </div>
        
        <div id="error" class="error" style="display: none;">
            无法连接到服务器，请确保后端服务正在运行
        </div>
        
        <div id="content" style="display: none;">
            <!-- 评分卡片 -->
            <div class="grid">
                <div class="card">
                    <div class="score-display">
                        <div class="card-title">📊 综合评分</div>
                        <div class="score-value" id="totalScore">--</div>
                        <div class="score-trend" id="trend">--</div>
                    </div>
                </div>
                
                <!-- 市场数据卡片 -->
                <div class="card">
                    <div class="card-title">📈 市场数据</div>
                    <div id="marketData">
                        <div class="market-item">
                            <span class="market-label">黄金价格</span>
                            <span class="market-value" id="goldPrice">--</span>
                        </div>
                        <div class="market-item">
                            <span class="market-label">涨跌</span>
                            <span class="market-value" id="goldChange">--</span>
                        </div>
                        <div class="market-item">
                            <span class="market-label">美元指数</span>
                            <span class="market-value" id="dxy">--</span>
                        </div>
                        <div class="market-item">
                            <span class="market-label">10年期国债</span>
                            <span class="market-value" id="bond">--</span>
                        </div>
                        <div class="market-item">
                            <span class="market-label">VIX恐慌指数</span>
                            <span class="market-value" id="vix">--</span>
                        </div>
                    </div>
                </div>
                
                <!-- 技术指标卡片 -->
                <div class="card">
                    <div class="card-title">🔧 技术指标</div>
                    <div id="technicalData">
                        <div class="indicator">
                            <span>MACD</span>
                            <span id="macd">--</span>
                        </div>
                        <div class="indicator">
                            <span>RSI</span>
                            <span id="rsi">--</span>
                        </div>
                        <div class="indicator">
                            <span>KDJ</span>
                            <span id="kdj">--</span>
                        </div>
                        <div class="indicator">
                            <span>布林带</span>
                            <span id="boll">--</span>
                        </div>
                    </div>
                </div>
                
                <!-- 新闻情绪卡片 -->
                <div class="card">
                    <div class="card-title">📰 新闻情绪</div>
                    <div id="newsData">
                        <div class="market-item">
                            <span class="market-label">情绪评分</span>
                            <span class="market-value" id="sentimentScore">--</span>
                        </div>
                        <div class="market-item">
                            <span class="market-label">市场情绪</span>
                            <span class="market-value" id="marketSentiment">--</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="last-update" id="lastUpdate">
                最后更新: --
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:5000/api';
        
        async function refreshData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('content').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            
            try {
                // 获取完整数据
                const response = await fetch(`${API_BASE}/full`);
                
                if (!response.ok) {
                    throw new Error('API请求失败');
                }
                
                const data = await response.json();
                
                // 更新状态
                document.getElementById('status').textContent = '● 已连接';
                document.getElementById('status').style.background = '#4ade80';
                
                // 更新评分
                if (data.score) {
                    document.getElementById('totalScore').textContent = data.score.total_score.toFixed(1);
                    document.getElementById('trend').textContent = data.score.trend || '--';
                }
                
                // 更新市场数据
                if (data.market && data.market.gold) {
                    const gold = data.market.gold;
                    document.getElementById('goldPrice').textContent = `$${gold.price?.toFixed(2) || '--'}`;
                    
                    const changeEl = document.getElementById('goldChange');
                    const change = gold.change_pct || 0;
                    changeEl.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
                    changeEl.className = `market-value ${change >= 0 ? 'positive' : 'negative'}`;
                }
                
                if (data.market && data.market.dxy) {
                    document.getElementById('dxy').textContent = data.market.dxy.price?.toFixed(2) || '--';
                }
                
                if (data.market && data.market.bond_10y) {
                    document.getElementById('bond').textContent = `${data.market.bond_10y.value?.toFixed(2) || '--'}%`;
                }
                
                if (data.market && data.market.vix) {
                    document.getElementById('vix').textContent = data.market.vix.value?.toFixed(2) || '--';
                }
                
                // 更新技术指标
                if (data.technical && data.technical.current) {
                    const tech = data.technical.current;
                    
                    if (tech.macd) {
                        document.getElementById('macd').textContent = tech.macd.signal || '--';
                    }
                    
                    if (tech.rsi) {
                        document.getElementById('rsi').textContent = `${tech.rsi.value?.toFixed(1) || '--'} (${tech.rsi.status || '--'})`;
                    }
                    
                    if (tech.kdj) {
                        document.getElementById('kdj').textContent = `${tech.kdj.k?.toFixed(1) || '--'}, ${tech.kdj.d?.toFixed(1) || '--'}, ${tech.kdj.j?.toFixed(1) || '--'}`;
                    }
                    
                    if (tech.boll) {
                        document.getElementById('boll').textContent = tech.boll.position || '--';
                    }
                }
                
                // 更新新闻情绪
                if (data.news_sentiment) {
                    document.getElementById('sentimentScore').textContent = data.news_sentiment.score?.toFixed(1) || '--';
                    document.getElementById('marketSentiment').textContent = data.news_sentiment.sentiment || '--';
                }
                
                // 更新时间
                if (data.market && data.market.gold && data.market.gold.time) {
                    document.getElementById('lastUpdate').textContent = `最后更新: ${data.market.gold.time}`;
                }
                
                // 显示内容
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                
            } catch (error) {
                console.error('获取数据失败:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('status').textContent = '● 连接失败';
                document.getElementById('status').style.background = '#f87171';
            }
        }
        
        // 页面加载时自动刷新
        window.onload = refreshData;
        
        // 每60秒自动刷新一次
        setInterval(refreshData, 60000);
    </script>
</body>
</html>
